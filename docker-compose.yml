services:
  postgres:
    image: postgres:16-alpine
    container_name: memex-postgres
    environment:
      POSTGRES_USER: memex
      POSTGRES_PASSWORD: memex
      POSTGRES_DB: memex
    ports:
      # 5454 host → 5432 container — evita colisión con otros postgres locales
      - "5454:5432"
    volumes:
      - memex_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memex"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Postgres EFÍMERO dedicado a la suite de tests (pytest apunta acá por default — ver
  # tests/conftest.py, _PG_BASE). Datos en tmpfs (RAM): evita el I/O del volumen Docker sobre WSL2,
  # que en Windows intermitentemente se cuelga ~3 min en un commit/CREATE DATABASE y dominaba el
  # tiempo de cada test (~0.5s/test → ~5ms/test en RAM; suite ~61s → ~20s). NO comparte datos con la
  # DB de dev `postgres`: otro puerto (5455), se vacía en cada reinicio. Durabilidad apagada porque
  # los datos son descartables (cada sesión de pytest dropea/recrea sus DBs).
  postgres-test:
    image: postgres:16-alpine
    container_name: memex-postgres-test
    command:
      - "postgres"
      - "-c"
      - "fsync=off"
      - "-c"
      - "synchronous_commit=off"
      - "-c"
      - "full_page_writes=off"
      - "-c"
      - "max_connections=300"
    environment:
      POSTGRES_USER: memex
      POSTGRES_PASSWORD: memex
      POSTGRES_DB: postgres
    ports:
      - "5455:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memex"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: memex-minio
    command: server /data --console-address ":9001"
    environment:
      # root user/password = credenciales S3 (access/secret key). Inyectadas por
      # Doppler en prod; defaults locales de dev acá.
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-memexminio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-memexminio-dev-secret}
    ports:
      - "9000:9000"  # API S3
      - "9001:9001"  # consola web
    volumes:
      - memex_miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: memex-api
    environment: &api_env
      # Dentro del compose, postgres se resuelve por nombre de servicio.
      MEMEX_DATABASE_URL: postgresql+psycopg://memex:memex@postgres:5432/memex
      MEMEX_AUTH_ENFORCED: "false"
      MEMEX_API_TOKEN: ""
      MEMEX_LOG_LEVEL: INFO
      # Telegram session files persistidos en volumen — sin esto cada reboot
      # del container exige correr `memex-telegram auth` interactivo de nuevo.
      MEMEX_TG_SESSION_PATH: /var/lib/memex/telegram
      MEMEX_TG_API_ID: ${MEMEX_TG_API_ID:-}
      MEMEX_TG_API_HASH: ${MEMEX_TG_API_HASH:-}
      MEMEX_TG_PHONE: ${MEMEX_TG_PHONE:-}
      # LLM (memex.llm) — sin prefijo MEMEX_; inyectada por Doppler. El consumidor
      # (classifier/summarizer) aún no existe, pero queda disponible desde ya.
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      # Apify (memex.ingestors.social) — token para scrapear redes (instagram/facebook/x).
      # La config social lo busca como MEMEX_APIFY_TOKEN; en Doppler el secreto canónico
      # (sin prefijo MEMEX_, como DEEPSEEK/OPENAI) se llama APIFY → lo mapeamos acá.
      MEMEX_APIFY_TOKEN: ${MEMEX_APIFY_TOKEN:-${APIFY:-}}
      # Almacenamiento de imágenes (memex.storage). El endpoint apunta al servicio
      # minio del compose; las credenciales sin prefijo MEMEX_ (root user/password).
      MEMEX_MINIO_ENDPOINT: http://minio:9000
      MEMEX_MINIO_BUCKET: ${MEMEX_MINIO_BUCKET:-memex-media}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-memexminio}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-memexminio-dev-secret}
      # OCR (memex.ocr) — proveedor de visión OpenAI-compatible. Sin prefijo MEMEX_
      # para la key (canónico, Doppler); base_url/model son config del despliegue.
      OCR_API_KEY: ${OCR_API_KEY:-}
      MEMEX_OCR_BASE_URL: ${MEMEX_OCR_BASE_URL:-}
      MEMEX_OCR_MODEL: ${MEMEX_OCR_MODEL:-}
      # IMAP Gmail (OAuth2). El email viene del .env; los paths apuntan a los archivos
      # montados desde ./secrets (client_secret.json + token.json del flujo authorize).
      MEMEX_IMAP_GMAIL_USER: ${MEMEX_IMAP_GMAIL_USER:-}
      MEMEX_IMAP_GMAIL_CLIENT_SECRET_JSON: /secrets/google_client_secret.json
      MEMEX_IMAP_GMAIL_TOKEN_JSON: /secrets/gmail_token.json
    ports:
      - "8787:8787"
    volumes:
      - memex_telegram_sessions:/var/lib/memex/telegram
      # OAuth de IMAP/calendar (client_secret + tokens). Gitignored. Montado RW para que el
      # refresh del access_token pueda persistir el token actualizado.
      - ./secrets:/secrets
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  # Daemon de procesamiento automático (memex-scheduler). IMPLEMENTADO pero APAGADO: está bajo el
  # profile "scheduler", así que `docker compose up` NO lo arranca. Para desplegarlo cuando se quiera
  # automatizar: `docker compose --profile scheduler up -d scheduler`. Aun corriendo, no procesa nada
  # hasta que el toggle de /procesamiento (tabla scheduler_settings) lo arme (daemon_enabled +
  # enabled_jobs); el daemon relee esa config cada tick. Apagado por default (filosofía del proyecto).
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: memex-scheduler
    profiles: ["scheduler"]
    command: ["memex-scheduler", "daemon", "start"]
    environment: *api_env
    volumes:
      - memex_telegram_sessions:/var/lib/memex/telegram
      - ./secrets:/secrets
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

volumes:
  memex_pgdata:
  memex_telegram_sessions:
  memex_miniodata:
