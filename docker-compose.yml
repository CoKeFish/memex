services:
  postgres:
    image: postgres:16-alpine
    container_name: memex-postgres
    environment:
      POSTGRES_USER: memex
      POSTGRES_PASSWORD: memex
      POSTGRES_DB: memex
    ports:
      # 5454 host → 5432 container — evita colisión con otros postgres locales
      - "5454:5432"
    volumes:
      - memex_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memex"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: memex-api
    environment:
      # Dentro del compose, postgres se resuelve por nombre de servicio.
      MEMEX_DATABASE_URL: postgresql+psycopg://memex:memex@postgres:5432/memex
      MEMEX_AUTH_ENFORCED: "false"
      MEMEX_API_TOKEN: ""
      MEMEX_LOG_LEVEL: INFO
      # Telegram session files persistidos en volumen — sin esto cada reboot
      # del container exige correr `memex-telegram auth` interactivo de nuevo.
      MEMEX_TG_SESSION_PATH: /var/lib/memex/telegram
      MEMEX_TG_API_ID: ${MEMEX_TG_API_ID:-}
      MEMEX_TG_API_HASH: ${MEMEX_TG_API_HASH:-}
      MEMEX_TG_PHONE: ${MEMEX_TG_PHONE:-}
    ports:
      - "8787:8787"
    volumes:
      - memex_telegram_sessions:/var/lib/memex/telegram
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  memex_pgdata:
  memex_telegram_sessions:
