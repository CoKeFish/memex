name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: memex
          POSTGRES_PASSWORD: memex
          POSTGRES_DB: postgres
        ports:
          - 5454:5432
        options: >-
          --health-cmd "pg_isready -U memex"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.9.28"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --frozen

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format check
        run: uv run ruff format --check .

      - name: mypy (strict)
        run: uv run mypy src tests

      - name: pytest
        env:
          # El conftest construye la URL de test desde MEMEX_TEST_PG (base sin nombre de DB) y crea
          # una DB por worker de xdist. En CI apuntamos al Postgres de servicio (localhost:5454); el
          # default local (5455, instancia en RAM) no existe acá. El runner Linux usa disco nativo,
          # así que no sufre el stall de I/O de WSL2 que motivó la instancia en RAM en local.
          MEMEX_TEST_PG: postgresql+psycopg://memex:memex@localhost:5454
        run: uv run pytest -q
