repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files

  # mypy corre via uv run para que use el venv del proyecto con todas las
  # deps tipadas (pydantic, sqlalchemy, etc.). Pass-filenames=false porque
  # mypy analiza el árbol completo, no por archivo modificado.
  - repo: local
    hooks:
      - id: mypy
        name: mypy (strict)
        entry: uv run mypy
        language: system
        types: [python]
        pass_filenames: false
        args: [src, tests]

      # pytest solo en pre-push — correr 241 tests en cada commit sería
      # demasiado lento. Bloquea solo cuando vas a empujar código.
      - id: pytest
        name: pytest (full suite, pre-push)
        entry: uv run pytest -q
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
